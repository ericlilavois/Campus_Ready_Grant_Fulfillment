    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

            const reader = ds.readable.getReader();

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than

      template = template.slice(0, i) + resourceScript + template.slice(i);

    // DOMParser/replaceWith are inert per spec — re-create each with

    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c714b54d-98b7-4ef4-b009-969a6575cd71\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"d2ed4350-8c83-4dcc-a9f0-58cb78b63c37\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9381b557-67a7-4b74-a1b3-763a9cd67362\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6799dff4-5cb1-401b-8a3e-d5086b737069\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"c714b54d-98b7-4ef4-b009-969a6575cd71\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Campus Ready Foundation — Color Tokens\n   ------------------------------------------------------------\n   The deployed site is built on a teal \"brand\" scale (Tailwind\n   teal) plus slate neutrals. The official style guide specifies\n   a slightly different primary teal (#469E92) reserved for the\n   dark CTA band. Both are preserved below — do not reconcile\n   without Eric's sign-off (documented brand decision).\n\n   The warm secondary palette (orange / yellow / green) lives in\n   ILLUSTRATION and print, not in UI chrome. Keep it out of\n   buttons, links, and interface surfaces.\n   ============================================================ */\n\n:root {\n  /* ---- Brand teal scale (operational primary) ---- */\n  --brand-50:  #f0fdfa;\n  --brand-100: #ccfbf1;\n  --brand-200: #99f6e4;\n  --brand-300: #5eead4;\n  --brand-400: #2dd4bf;\n  --brand-500: #14b8a6;   /* PRIMARY — buttons, links, eyebrows, icon strokes, rules */\n  --brand-600: #0d9488;   /* hover on primary */\n  --brand-700: #0f766e;\n  --brand-800: #115e59;\n  --brand-900: #134e4a;\n\n  /* ---- Style-guide primary teal (CTA band only) ---- */\n  --crf-teal: #469E92;    /* \"Campus Ready Foundation Teal\" — .cta-dark background */\n\n  /* ---- Secondary palette — ILLUSTRATION / print accent only ---- */\n  --crf-orange:    #DD693A;\n  --crf-yellow:    #FCB040;\n  --crf-green:     #8CC274;\n  --crf-lt-green:  #DAE244;   /* lime checkmark in the \"Prepare to be Prepared\" badge */\n  --crf-lt-teal:   #A3C6C0;\n  --crf-lt-blue:   #E8EDF0;\n\n  /* ---- Slate neutrals (text + surfaces) ---- */\n  --slate-900: #0f172a;\n  --slate-800: #1e293b;\n  --slate-700: #334155;\n  --slate-600: #475569;\n  --slate-500: #64748b;\n  --slate-400: #94a3b8;\n  --slate-300: #cbd5e1;\n  --slate-200: #e2e8f0;\n  --slate-100: #f1f5f9;\n  --slate-50:  #f8fafc;\n  --white:     #ffffff;\n\n  /* ============================================================\n     Semantic aliases — prefer these in components & layouts\n     ============================================================ */\n\n  /* Brand intent */\n  --color-primary:        var(--brand-500);\n  --color-primary-hover:  var(--brand-600);\n  --color-primary-active: var(--brand-700);\n  --color-accent:         var(--brand-500);\n\n  /* Text */\n  --text-strong:  var(--slate-900);   /* headlines, primary body */\n  --text-body:    var(--slate-600);   /* secondary body copy */\n  --text-muted:   var(--slate-500);   /* captions, helper text */\n  --text-faint:   var(--slate-400);   /* footnotes, labels */\n  --text-on-dark: var(--white);\n  --text-link:    var(--brand-700);\n  --text-eyebrow: var(--brand-500);\n\n  /* Surfaces */\n  --surface-page:    var(--white);\n  --surface-card:    var(--white);\n  --surface-tint:    var(--brand-50);   /* light teal section band */\n  --surface-muted:   var(--slate-50);   /* light grey section band */\n  --surface-cta:     var(--crf-teal);   /* dark CTA band */\n\n  /* Borders */\n  --border-default:  var(--slate-200);\n  --border-tint:     var(--brand-100);\n  --border-strong:   var(--slate-300);\n  --border-focus:    var(--brand-400);\n\n  /* Page background gradient (subtle teal glow, upper-right + lower-left) */\n  --page-gradient:\n    radial-gradient(ellipse 900px 500px at 60% -10%, rgba(20,184,166,.10) 0%, transparent 55%),\n    radial-gradient(ellipse 500px 400px at 10% 70%, rgba(20,184,166,.06) 0%, transparent 50%); /* @kind other */\n\n  /* CTA gradient (teal, used on donate page final CTA) */\n  --cta-gradient: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%); /* @kind other */\n}\n<\u002Fstyle>\n  <script src=\"e3cfc677-d07c-440c-a2d8-8ddf53666538\"><\u002Fscript>\n  <style>\n    body { margin: 0; padding: 0; background: #dde3ea; }\n    .doc {\n      box-sizing: border-box;\n      max-width: 8.5in;\n      margin: 0 auto;\n      background: #fff;\n      box-shadow: 0 8px 40px rgba(0,0,0,.18);\n      padding: 0.25in 0.8in 0.9in;\n    }\n\n    h1, h2, h3 { text-wrap: balance; }\n    p, li { text-wrap: pretty; }\n    .page-break { break-before: page; page-break-before: always; }\n    .no-break { break-inside: avoid; page-break-inside: avoid; }\n    .screen-only { }\n    @page { size: letter; margin: 0.5in 0.8in; }\n    @media print {\n      html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n      html, body { margin: 0; padding: 0; background: #fff; }\n      .doc { max-width: none !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }\n\n      .screen-only { display: none !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n<!-- Screen toolbar -->\n\n\n<main class=\"doc\">\n\n      <!-- ============================================================ -->\n      <!-- PAGE 1: COVER                                                -->\n      <!-- ============================================================ -->\n\n      <!-- Centered logo -->\n      <div style=\"text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #e2e8f0;\" data-comment-anchor=\"cf43aaa074-div\">\n        <img src=\"87f70472-5ade-4972-b35a-542f39e3378a\" alt=\"Campus Ready Foundation\" style=\"height:108px;width:auto;\">\n      <\u002Fdiv>\n\n      <!-- Title block -->\n      <div style=\"margin-bottom:44px;\">\n        <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:#94a3b8;letter-spacing:0.03em;margin-bottom:10px;\">Orientation &amp; Celebration &nbsp;·&nbsp; July 15, 2026<\u002Fdiv>\n        <div style=\"font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#14b8a6;margin-bottom:14px;\">Speaker Reference Guide<\u002Fdiv>\n        <div style=\"width:3rem;height:3px;background:#14b8a6;margin-bottom:20px;border-radius:2px;\"><\u002Fdiv>\n        <h1 style=\"font-family:'Playfair Display',serif;font-size:52px;font-weight:800;color:#0f172a;line-height:1.08;letter-spacing:-0.01em;margin:0 0 10px;\">Move-In Day<\u002Fh1>\n        <p style=\"font-family:'Playfair Display',serif;font-size:25px;font-weight:700;font-style:italic;color:#64748b;margin:0 0 40px;line-height:1.3;\">What the Packing List Doesn't Cover<\u002Fp>\n        <div style=\"width:100%;height:1px;background:#e2e8f0;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Phase overview cards -->\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n        <div class=\"no-break\" style=\"padding:18px 16px;border:1px solid #e2e8f0;border-radius:10px;border-top:3px solid #14b8a6;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:0.63rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:#14b8a6;margin-bottom:7px;\">Phase 1<\u002Fdiv>\n          <div style=\"font-family:'Playfair Display',serif;font-size:17px;font-weight:700;font-style:italic;color:#0f172a;line-height:1.25;margin-bottom:6px;\">Prepare to be Prepared<\u002Fdiv>\n          \n        <\u002Fdiv>\n        <div class=\"no-break\" style=\"padding:18px 16px;border:1px solid #e2e8f0;border-radius:10px;border-top:3px solid #14b8a6;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:0.63rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:#14b8a6;margin-bottom:7px;\">Phase 2<\u002Fdiv>\n          <div style=\"font-family:'Playfair Display',serif;font-size:17px;font-weight:700;font-style:italic;color:#0f172a;line-height:1.25;margin-bottom:6px;\">Start Strong<\u002Fdiv>\n          \n        <\u002Fdiv>\n        <div class=\"no-break\" style=\"padding:18px 16px;border:1px solid #e2e8f0;border-radius:10px;border-top:3px solid #14b8a6;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:0.63rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:#14b8a6;margin-bottom:7px;\">Phase 3<\u002Fdiv>\n          <div style=\"font-family:'Playfair Display',serif;font-size:17px;font-weight:700;font-style:italic;color:#0f172a;line-height:1.25;margin-bottom:6px;\">Stay Strong<\u002Fdiv>\n          \n        <\u002Fdiv>\n      <\u002Fdiv>\n\n\n      <!-- ============================================================ -->\n      <!-- PAGE 2: QUICK REFERENCE                                      -->\n      <!-- ============================================================ -->\n\n      <div class=\"page-break\">\n\n        <div style=\"margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid #e2e8f0;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#14b8a6;margin-bottom:6px;\">Quick Reference<\u002Fdiv>\n          <h2 style=\"font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#0f172a;margin:0;line-height:1.15;\">10 tips in three phases<\u002Fh2>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0.45in;align-items:start;\">\n\n          <!-- LEFT: Phase 1 -->\n          <div data-comment-anchor=\"00fee88d4d-div\">\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:baseline;\">\n                <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;\">1<\u002Fspan>\n                <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;\">Set up, and read your school email<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:baseline;\">\n                <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;\">2<\u002Fspan>\n                <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;\">Call your roommate<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:flex-start;\">\n                <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;padding-top:2px;\">3<\u002Fspan>\n                <div>\n                  <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;margin-bottom:2px;\">Pull together your personal documents<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:flex-start;\">\n                <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;padding-top:2px;\">4<\u002Fspan>\n                <div>\n                  <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;margin-bottom:2px;\">If you're flying: ship, don't check<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:baseline;\">\n                <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;\">5<\u002Fspan>\n                <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;\">Research your arrival before you leave home<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- RIGHT: Phase 2 + Phase 3 -->\n          <div>\n            <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:20px;\">\n              <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:flex-start;\">\n                <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;padding-top:2px;\">6<\u002Fspan>\n                <div>\n                  <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;margin-bottom:2px;\">Know how you're getting there<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:baseline;\">\n                <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;\">7<\u002Fspan>\n                <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;\">Complete your room condition report carefully<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:baseline;\">\n                <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;\">8<\u002Fspan>\n                <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;\">Choose your bed. Then make it.<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:baseline;\">\n                <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;\">9<\u002Fspan>\n                <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;\">After your room is set up<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"width:100%;height:1px;background:#e2e8f0;margin-bottom:20px;margin-top:28px;\"><\u002Fdiv>\n            <div class=\"no-break\" style=\"display:flex;gap:10px;align-items:flex-start;\">\n              <span style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:16px;flex-shrink:0;padding-top:2px;\">10<\u002Fspan>\n              <div>\n                <div style=\"font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:#0f172a;line-height:1.4;margin-bottom:2px;\">Be kind to yourself<\u002Fdiv>\n                \n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n\n      <!-- ============================================================ -->\n      <!-- PAGES 3–4: PHASE 1 SPEAKER NOTES                            -->\n      <!-- ============================================================ -->\n\n      <div class=\"page-break\">\n\n        <div class=\"no-break\" style=\"padding-bottom:22px;border-bottom:2px solid #e2e8f0;margin-bottom:32px;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#14b8a6;margin-bottom:12px;\">Speaker Notes<\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;\">\n            <h2 style=\"font-family:'Playfair Display',serif;font-size:38px;font-weight:800;color:#0f172a;margin:0;line-height:1.1;\">Prepare to be Prepared<\u002Fh2>\n            \n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TIP 1 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">01<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">Set up, and read your school email<\u002Fh3>\n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>Move-in details (room assignment, check-in window, roommate contact, orientation date &amp; time) go to your school email, not your personal email<\u002Fli>\n              <li>Set it up as soon as possible. Check it this week.<\u002Fli>\n              <li>UC Berkeley, UCSC, UC Davis, Cal Poly SLO, and UCSD likely use assigned time slots<\u002Fli>\n            <\u002Ful>\n            <div style=\"margin-top:9px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [1][2][3][4]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TIP 2 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">02<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">Call your roommate<\u002Fh3>\n            \n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>Coordinate: who's bringing the mini fridge, microwave, rug<\u002Fli>\n              <li>Check your housing portal for room dimensions. Many schools post them<\u002Fli>\n              <li>One conversation now smoothes the path forward and avoids awkward moments on arrival<\u002Fli><li>Cal Poly first-year rooms are primarily triples, not doubles<\u002Fli>\n              \n            <\u002Ful><div style=\"margin-top:9px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [5][6]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TIP 3 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">03<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">Pull together your personal documents<\u002Fh3>\n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>Gov't ID, health insurance card, immunization records, financial aid letter, Social Security card<\u002Fli>\n              <li>Physical copies + photo of each on your phone<\u002Fli>\n              <li>At 18, federal law transfers your medical and school records to you. Parents lose automatic access. Consider completing a HIPAA release form.<\u002Fli>\n              <li>HIPAA release form: sign before you leave, file at campus health on arrival. Search your school's website for instructions.<\u002Fli>\n            <\u002Ful>\n            <div style=\"margin-top:12px;padding:10px 14px;background:#f0fdfa;border-left:3px solid #14b8a6;border-radius:0 6px 6px 0;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.11em;text-transform:uppercase;color:#0d9488;margin-bottom:3px;\">Speaker Note<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:#134e4a;font-style:italic;line-height:1.6;\" data-comment-anchor=\"4292954f27-div\">Emphasize the HIPAA point. This is as important for parents as it is for students.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:8px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [7]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"page-break\"></div>\n\n        <!-- TIP 4 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">04<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">If you're flying: ship, don't check<\u002Fh3>\n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>3 checked bags round-trip: likely $300–$400 in fees; UPS or FedEx Ground may be cheaper<\u002Fli>\n              <li>Consider College Boxes or Storage Scholars. These are companies that pick up, ship, store, and deliver your belongings and they partner with colleges<\u002Fli>\n              <li>Fly with 1 week of essentials: clothes, meds, laptop, chargers, toiletries, 1 set of bedding<\u002Fli>\n              <li>Ship to arrive 2–3 days after you get there, not before; Pack bedding last so it comes out first.&nbsp;<\u002Fli>\n              <li>Most mailrooms hold packages 3–7 days; you must be there to retrieve them<\u002Fli>\n              <li data-comment-anchor=\"d91361b2dc-li\">Use Lyft from the airport: find the rideshare zone before you exit baggage claim. You may need to walk, and a rolling cart helps<\u002Fli>\n            <\u002Ful>\n            \n            <div style=\"margin-top:8px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [9][10][11][12][13]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TIP 5 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">05<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">Research your arrival before you leave home<\u002Fh3>\n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>Find your check-in location. At some schools, it's not your dorm building<\u002Fli>\n              <li>Do this as soon as possible. Save the address in Google Maps<\u002Fli>\n              <li>Find the drop-off and unloading zone for your dorm. Most schools post move-in maps<\u002Fli>\n              <li>Find out where carts are stored (usually at check-in or dorm entrance)&nbsp;<\u002Fli>\n              <li>Know your mailroom location and hours if packages are arriving<\u002Fli>\n              <li>Know when your dining hall opens and how to activate your meal plan<\u002Fli>\n              <li>Know your freshman orientation schedule — when it starts, what's required, and what to bring<\u002Fli>\n              <li>Know where and how to get your Student ID<\u002Fli>\n            <\u002Ful>\n            \n            <div style=\"margin-top:8px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [5][14][15][16]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n\n      <!-- ============================================================ -->\n      <!-- PAGES 5–6: PHASE 2 SPEAKER NOTES                            -->\n      <!-- ============================================================ -->\n\n      <div class=\"page-break\">\n\n        <div class=\"no-break\" style=\"padding-bottom:22px;border-bottom:2px solid #e2e8f0;margin-bottom:32px;\">\n          <div style=\"display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;\">\n            <h2 style=\"font-family:'Playfair Display',serif;font-size:38px;font-weight:800;color:#0f172a;margin:0;line-height:1.1;\">Start Strong<\u002Fh2>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TIP 6 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">06<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">Know how you're getting there and what happens when you arrive<\u002Fh3>\n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>Everyone:  Plan to arrive early to try and be the first in your room. The first one in the room gets first choice of spaces.<\u002Fli>\n              <li><strong style=\"color:#0f172a;font-weight:600;\">Driving:<\u002Fstrong> use the temporary unloading zone, not a regular spot; move the car before hauling; someone should stay with it<\u002Fli>\n              <li><strong style=\"color:#0f172a;font-weight:600;\">Lyft / drop-off:<\u002Fstrong> have the driver stop at the unloading zone; find a cart before moving bags; plan on multiple trips<\u002Fli>\n              <li><strong style=\"color:#0f172a;font-weight:600;\">Traveling alone:<\u002Fstrong> ask a move-in volunteer or your RA to help with bags — that's what they're there for<\u002Fli>\n              <li>Remember:  everyone on move-in day is figuring it out. You're not alone.<\u002Fli>\n            <\u002Ful>\n            \n            <div style=\"margin-top:8px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [5][14][15]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TIP 7 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">07<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">Complete your room condition report carefully<\u002Fh3>\n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>Your RA may walk you through it on arrival and record existing damage<\u002Fli>\n              <li>Anything not on that report at move-out can be charged to you<\u002Fli>\n              \n              <li>Take photos of any damage. That's your evidence if ever needed<\u002Fli>\n              <li>One student was charged $300 for a dresser that was never in her room<\u002Fli>\n            <\u002Ful>\n            <div style=\"margin-top:8px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [17][18][19]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"page-break\"></div>\n\n        <!-- TIP 8 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">08<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">Choose your bed. Then make it.<\u002Fh3>\n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>Before unpacking: wipe everything down (desk, dresser, windowsill)<\u002Fli>\n              <li>Choose your bed. The location helps define your personal space.  If you don't get your preferred location, don't sweat it, you may be able to change it later.<\u002Fli>\n              \n              \n              <li>Make the bed before anything else. <\u002Fli>\n              <li>A made bed makes the room feel like somewhere you actually live<\u002Fli>\n              <li>As you're unpacking and settling in, leave your door open  <\u002Fli>\n              <li>Everyone on the hall is nervous and wants to make connections. Be the one who makes it easy<\u002Fli>\n            <\u002Ful>\n            <div style=\"margin-top:8px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [5][20][21]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TIP 9 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">09<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">After your room is set up<\u002Fh3>\n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>Meet your RA. They're there to help. They know the building, the rules, and have experience with dorm life. Introduce yourself and remember their name.<\u002Fli>\n              <li>Put their number in your phone. They'll be a resource for information and help all year.<\u002Fli>\n              <li>Attend Freshman Orientation. Don't skip this. That's where you'll get many questions answered, meet other students, and make early bonds with new friends.<\u002Fli>\n              <li>You'll meet more neighbors met in 2 open-door hours than in 2 closed-door weeks<\u002Fli>\n            <\u002Ful>\n            <div style=\"margin-top:8px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [5][22]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n\n      <!-- ============================================================ -->\n      <!-- PAGE 7: PHASE 3 SPEAKER NOTES                               -->\n      <!-- ============================================================ -->\n\n      <div class=\"page-break\">\n\n        <div class=\"no-break\" style=\"padding-bottom:22px;border-bottom:2px solid #e2e8f0;margin-bottom:32px;\">\n          <div style=\"display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;\">\n            <h2 style=\"font-family:'Playfair Display',serif;font-size:38px;font-weight:800;color:#0f172a;margin:0;line-height:1.1;\">Stay Strong<\u002Fh2>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TIP 10 -->\n        <div class=\"no-break\" style=\"display:flex;gap:18px;align-items:flex-start;margin-bottom:40px;padding-bottom:36px;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:#14b8a6;min-width:24px;flex-shrink:0;margin-top:5px;letter-spacing:0.03em;\">10<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <h3 style=\"font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:#0f172a;margin:0 0 10px;line-height:1.3;\">Be kind to yourself<\u002Fh3>\n            <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:14px;color:#475569;line-height:1.75;list-style:disc;\">\n              <li>What you feel in the first weeks is normal: stress, loneliness, uncertainty<\u002Fli>\n              <li>Everyone is feeling the same thing, whether they show it or not.<\u002Fli>\n              <li>High school provided structure. College gives you freedom. Learning to manage that change takes time.<\u002Fli>\n              <li>Things that actually help:\n                <ul style=\"margin-top:4px;padding-left:17px;list-style:circle;\">\n                  <li>Find the five places you'll need all year: dining hall, health center, financial aid office, library, your first classroom<\u002Fli>\n                  <li>Know how to activate your meal plan<\u002Fli>\n                  <li>Find the gym and get a workout in<\u002Fli>\n                  <li>Go to the events that are scheduled, especially in the first week<\u002Fli>\n                  <li>Say yes to one thing you didn't plan to do<\u002Fli>\n                <\u002Ful>\n              <\u002Fli>\n              <li>Keep in mind: you're not behind. You're right on time.<\u002Fli>\n            <\u002Ful>\n            \n            <div style=\"margin-top:8px;font-family:'Inter',sans-serif;font-size:10.5px;color:#94a3b8;\">Sources: [26][27][28]<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Closing mark -->\n        \n\n      <\u002Fdiv>\n\n\n      <!-- ============================================================ -->\n      <!-- PAGE 8: SOURCE NOTES                                         -->\n      <!-- ============================================================ -->\n\n      <div class=\"page-break\">\n\n        <div style=\"margin-bottom:24px;padding-bottom:18px;border-bottom:2px solid #e2e8f0;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#14b8a6;margin-bottom:6px;\">Source Notes<\u002Fdiv>\n          <p style=\"font-family:'Inter',sans-serif;font-size:12.5px;color:#64748b;margin:0;line-height:1.6;\">For verification, updates, and future cycle research.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0 0.4in;\">\n          <div>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[1] UC Berkeley Housing — Move-In 2026<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">housing.berkeley.edu/living-on-campus/move-in/<br>Assigned time slot system; Aug 17–19, 2026.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[2] UC Santa Cruz Housing — Move-In<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">housing.ucsc.edu/move-in/<br>Appointment-based by college; slot from housing portal.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[3] UC Davis Student Housing — Move-In FAQ<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">housing.ucdavis.edu/moving-in/residence-halls/faq/<br>Appointment-only; Sept 16–18, 2026.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[4] Cal Poly SLO — First-Year Housing FAQ<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">housing.calpoly.edu/content/frequently-asked-questions<br>First-year rooms primarily triples; SLO Days mandatory.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[5] Sleepyhead 2026 College Move-In Survival Guide<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">sleepyheadusa.com/blogs/sleepyhead-university/...<br>Primary practical source: window, roommate, room dimensions, bed first, open door.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[6] The Dorm Guide — How to Prepare and Pack<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">thedormguide.com/pack-for-dorm-college-move-in-day/<br>Room dimensions in housing portal; coordinate shared items.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[7] Etch Financial — Legal Documents Before College<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">etchfinancial.com/before-your-kid-leaves-for-college...<br>FERPA + HIPAA transfer at 18; hospitals not required to inform family without release.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[9] Storage Scholars — Flying to College Shipping Guide<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">storagescholars.com/blog/flying-to-college-shipping-guide<br>Airline fee math vs. shipping; ship 2–3 days after arrival.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[10] The Dorm Guide — Long Distance College Move<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">thedormguide.com/dorm-plan-for-long-distance-college-move/<br>Ship ahead programs.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[11] Leisurely Linds — Flying Alone Tips<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">leisurelylinds.com/tips-for-flying-alone-for-beginners/<br>2 hours early; plan ground transport before landing.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[12] Gap360 — First Time Flying Solo<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">gap360.com/guidebook/first-time-flying-solo...<br>Download airline app; security procedure.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[13] PreFlight Airport Parking — First Time Flying<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">preflightairportparking.com/travel-tips/...<br>Offline Google Maps; rideshare zones differ from baggage claim.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[14] U.S. News — Move-In Day Tips<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">usnews.com/education/.../what-college-freshmen-should-expect-on-move-in-day<br>Assigned slots for elevator/parking; room condition report process.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[15] CollegiateParent — Parent-to-Parent Advice<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">collegiateparent.com/family-life/parent-to-parent-advice...<br>Financial aid office as most-used freshman resource.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[16] McKendree University — Move-In Pro-Tips<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">mckendree.edu/offices/marketing/blog/move-in-guide.php<br>Keep ID accessible; dress practically.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[17–19] Room Condition Report Sources<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">thefashionspot.com · usnews.com · mckendree.edu<br>Real account: charged $300–$500 for missing dresser. Wipe all surfaces before unpacking.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[20–22] Unpack Sequence + RA Sources<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">sleepyheadusa.com · thedormguide.com · summer.harvard.edu<br>Bed first, then desk, closet, bathroom kit. RA role and roommate conflict resolution.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"no-break\" style=\"margin-bottom:12px;\">\n              <div style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:#0f172a;margin-bottom:3px;\">[26–28] First 48 Hours Sources<\u002Fdiv>\n              <div style=\"font-family:'Inter',sans-serif;font-size:11px;color:#64748b;line-height:1.6;\">collegedata.com · berry.edu · hercampus.com<br>46% least prepared for academics; financial aid office most used (51%); disorientation universal.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"page-break\"></div>\n\n        <!-- Research gaps -->\n        <div style=\"margin-top:20px;padding:16px 18px;border:1px solid #e2e8f0;border-radius:9px;background:#f8fafc;\">\n          <div style=\"font-family:'Inter',sans-serif;font-size:0.63rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:#64748b;margin-bottom:9px;\">Research gaps for future cycles<\u002Fdiv>\n          <ul style=\"margin:0;padding-left:17px;font-family:'Inter',sans-serif;font-size:12px;color:#64748b;line-height:1.75;list-style:disc;\">\n            <li>Reddit (r/college, r/firstgencollege) — richest source of unfiltered student voice. Search \"move-in day tips\" and \"what I wish I knew.\"<\u002Fli>\n            <li>College Boxes: confirm current pricing, school coverage, and booking flow before July 15. Add direct link to student take-home.<\u002Fli>\n            <li>Dorm-direct shipping: confirm which schools in the cohort allow pre-arrival packages and the exact mailing address format per school.<\u002Fli>\n            <li>School-specific pages not yet confirmed for all 41 students. UC system and Cal Poly represent the plurality.<\u002Fli>\n            <li>Best future source: the 2026 cohort itself. Add to September outreach: \"What's one thing you'd tell next year's class before move-in day?\"<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n<\u002Fmain>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
